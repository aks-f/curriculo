<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWEB1 — Cap. 05 — AT03 — Formulário de Matrícula Acadêmica</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .campo {
            margin-bottom: 15px;
        }

        .obrigatorio {
            color: #e74c3c;
            font-weight: bold;
        }
        
        .check-group,  .radio-group {
            gap: 10px;
        }
        
            .check-group label, .radio-group label {
            cursor: pointer;
        }

        .botoes {
            display: flex;
            gap: 15px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Solicitação de Matrícula</h1>
        <p><a href="../index.html">← Voltar para a página principal</a></p>
        <p><span class="obrigatorio">*</span> Indica campos obrigatórios</p>
    </header>

    <main>
        <form action="https://httpbin.org/post" method="POST">
            
            <fieldset>
                <legend>Dados Pessoais</legend>
                
                <div class="campo">
                    <label for="nome">Nome completo <span class="obrigatorio">*</span></label>
                    <input type="text" id="nome" name="nome" required minlength="5" maxlength="100">
                </div>

                <div class="campo">
                    <label for="cpf">CPF <span class="obrigatorio">*</span></label>
                    <input type="text" id="cpf" name="cpf" required 
                           pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" 
                           placeholder="000.000.000-00" 
                           title="CPF no formato 000.000.000-00">
                </div>

                <div class="campo">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" 
                           pattern="\(\d{2}\)\s\d{4,5}-\d{4}" 
                           placeholder="(82) 99999-9999">
                </div>

                <div class="campo">
                    <label for="email">E-mail <span class="obrigatorio">*</span></label>
                    <input type="email" id="email" name="email" required>
                </div>
            </fieldset>

            <fieldset>
                <legend>Dados Acadêmicos</legend>

                <div class="campo">
                    <label for="curso">Curso <span class="obrigatorio">*</span></label>
                    <select id="curso" name="curso" required>
                        <option value="">-- Selecione um curso --</option>
                        <optgroup label="Computação">
                            <option value="si">Sistemas de Informação</option>
                            <option value="cc">Ciência da Computação</option>
                            <option value="ec">Engenharia da Computação</option>
                        </optgroup>
                        <optgroup label="Gestão">
                            <option value="adm">Administração</option>
                            <option value="cont">Ciências Contábeis</option>
                        </optgroup>
                    </select>
                </div>

                <fieldset>
                    <legend>Período</legend>
                    <div class="radio-group">
                        <span>
                            <input type="radio" id="manhas" name="periodo" value="manha" required>
                            <label for="manhas">Manhã</label>
                        </span>
                        <span>
                            <input type="radio" id="tarde" name="periodo" value="tarde">
                            <label for="tarde">Tarde</label>
                        </span>
                        <span>
                            <input type="radio" id="noite" name="periodo" value="noite">
                            <label for="noite">Noite</label>
                        </span>
                    </div>
                </fieldset>

                <div class="campo" style="margin-top: 15px;">
                    <label for="ano_ingresso">Ano de ingresso pretendido <span class="obrigatorio">*</span></label>
                    <input type="number" id="ano_ingresso" name="ano_ingresso" min="2025" max="2030" required>
                </div>
            </fieldset>

            <fieldset>
                <legend>Áreas de Interesse</legend>
                <div class="check-group">
                    <span>
                        <input type="checkbox" id="web" name="interesses[]" value="web">
                        <label for="web">Desenvolvimento Web</label>
                    </span>
                    <span>
                        <input type="checkbox" id="bd" name="interesses[]" value="banco_dados">
                        <label for="bd">Banco de Dados</label>
                    </span>
                    <span>
                        <input type="checkbox" id="ia" name="interesses[]" value="ia">
                        <label for="ia">Inteligência Artificial</label>
                    </span>
                    <span>
                        <input type="checkbox" id="seg" name="interesses[]" value="seguranca">
                        <label for="seg">Segurança da Informação</label>
                    </span>
                    <span>
                        <input type="checkbox" id="infra" name="interesses[]" value="infraestrutura">
                        <label for="infra">Infraestrutura</label>
                    </span>
                </div>
            </fieldset>

            <div class="botoes">
                <button type="submit">Solicitar matrícula</button>
                <button type="reset">Limpar formulário</button>
            </div>

        </form>
    </main>

</body>
</html>
