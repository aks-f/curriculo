<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWEB1 — Cap. 05 — AT04 — Inscrição em Evento</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .campo {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Semana de Tecnologia IFAL</h1>
        <p><a href="../index.html">← Voltar para a página principal</a></p>
        <p>Preencha os campos abaixo para garantir sua vaga no evento.</p>
    </header>

    <main>
        <form action="https://httpbin.org/post" method="POST" enctype="multipart/form-data">
            
            <input type="hidden" name="edicao" value="2026">

            <section>
                <h2>Identificação do Participante</h2>
                
                <div class="campo">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="campo">
                    <label for="email">E-mail institucional</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="campo">
                    <label for="cidade">Cidade de origem (Alagoas)</label>
                    <input type="text" id="cidade" name="cidade" list="cidades-al">
                    <datalist id="cidades-al">
                        <option value="Maceió">
                        <option value="Arapiraca">
                        <option value="Palmeira dos Índios">
                        <option value="Rio Largo">
                        <option value="Penedo">
                        <option value="União dos Palmares">
                        <option value="Pilar">
                        <option value="Santana do Ipanema">
                        <option value="Coruripe">
                        <option value="Marechal Deodoro">
                    </datalist>
                </div>

                <div class="campo">
                    <label for="foto">Foto para crachá</label>
                    <input type="file" id="foto" name="foto" accept="image/jpeg,image/png" aria-describedby="dica-foto">
                    <small id="dica-foto">Formatos aceitos: JPG e PNG. Tamanho máximo: 2 MB.</small>
                </div>
            </section>

            <section>
                <h2>Preferências e Interesses</h2>

                <div class="campo">
                    <label for="chegada">Data e hora preferida para chegada</label>
                    <input type="datetime-local" id="chegada" name="chegada">
                </div>

                <div class="campo">
                    <label for="experiencia">
                        Nível de experiência em programação: <span id="valor-experiencia">5</span>/10
                    </label>
                    <input type="range" id="experiencia" name="experiencia" min="0" max="10" step="1" value="5" 
                           oninput="document.getElementById('valor-experiencia').textContent = this.value">
                </div>

                <div class="campo">
                    <label for="cor">Cor de preferência para a camiseta</label>
                    <input type="color" id="cor" name="cor_camiseta" value="#1a73e8">
                </div>

                <div class="campo">
                    <label for="oficinas">Oficinas de interesse</label>
                    <select id="oficinas" name="oficinas[]" multiple size="4" aria-describedby="dica-select">
                        <option value="web">Desenvolvimento Web Moderno</option>
                        <option value="python">Data Science com Python</option>
                        <option value="iot">Internet das Coisas (IoT)</option>
                        <option value="ux">Design de Experiência (UX)</option>
                        <option value="agile">Metodologias Ágeis</option>
                    </select>
                    <small id="dica-select">Use Ctrl (ou Cmd no Mac) para selecionar mais de uma oficina.</small>
                </div>
            </section>

            <button type="submit">Confirmar inscrição</button>
        </form>
    </main>

</body>
</html>
