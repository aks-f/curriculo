<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWEB1 — Cap. 05 — AT02 — Cadastro de Usuário</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .campo {
            margin-bottom: 15px;
        }
        .radio-group label {
            margin-right: 10px;
            cursor: pointer;
        }

        .botoes {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>

    <h1>Cadastro</h1>
    <p><a href="../index.html">← Voltar para a página principal</a></p>

    <form action="https://httpbin.org/post" method="POST">
        
        <div class="campo">
            <label for="nome">Nome completo:</label>
            <input type="text" id="nome" name="nome" required minlength="3">
        </div>

        <div class="campo">
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="campo">
            <label for="senha">Senha (mínimo 8 caracteres):</label>
            <input type="password" id="senha" name="senha" required minlength="8">
        </div>

        <div class="campo">
            <label for="nascimento">Data de nascimento:</label>
            <input type="date" id="nascimento" name="nascimento" required>
        </div>

        <fieldset>
            <legend>Gênero</legend>
            <div class="radio-group">
                <input type="radio" id="gen-m" name="genero" value="masculino">
                <label for="gen-m">Masculino</label>

                <input type="radio" id="gen-f" name="genero" value="feminino">
                <label for="gen-f">Feminino</label>

                <input type="radio" id="gen-o" name="genero" value="outro">
                <label for="gen-o">Outro</label>

                <input type="radio" id="gen-n" name="genero" value="prefiro_nao_informar">
                <label for="gen-n">Prefiro não informar</label>
            </div>
        </fieldset>

        <div class="campo">
            <input type="checkbox" id="aceite" name="aceite" value="sim" required>
            <label for="aceite">Li e aceito os termos de uso</label>
        </div>

        <div class="botoes">
            <button type="submit">Criar conta</button>
            <button type="reset">Limpar campos</button>
        </div>

    </form>

</body>
</html>
